name: E2E reflect (real stack)

# Runs the admin -> storefront "reflect" e2e suite against a real seeded API +
# Postgres, so a regression in the admin/public data path fails CI. These specs
# are gated behind E2E_REAL_STACK and skipped in every other run.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: e2e-reflect-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-reflect:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: jovie_joy
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d jovie_joy"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # API config (Development => loopback CORS + seeding on startup).
      ConnectionStrings__Default: "Host=localhost;Port=5432;Database=jovie_joy;Username=postgres;Password=postgres"
      Jwt__Secret: "ci-secret-ci-secret-ci-secret-1234"
      Stripe__SecretKey: "sk_test_dummy"
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://localhost:8080"
      # Web -> API base URL (matches the running API above).
      NEXT_PUBLIC_API_URL: "http://localhost:8080"

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Build API
        run: dotnet build apps/api/JovieJoy.Api.csproj -c Release --nologo

      - name: Start API (migrate + seed) and wait for health
        run: |
          nohup dotnet apps/api/bin/Release/net9.0/JovieJoy.Api.dll > /tmp/api.log 2>&1 &
          echo "Waiting for API on :8080 ..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080/health >/dev/null; then
              echo "API healthy"; exit 0
            fi
            sleep 2
          done
          echo "::error::API failed to become healthy"; tail -n 100 /tmp/api.log; exit 1

      - name: Install web deps
        working-directory: apps/web
        run: npm ci

      - name: Install Playwright (chromium)
        working-directory: apps/web
        run: npx playwright install --with-deps chromium

      - name: Run reflect e2e
        working-directory: apps/web
        env:
          E2E_REAL_STACK: "1"
          CI: "1"
        # Playwright's webServer starts Next on :3100. Single worker + generous
        # timeout because the dev server compiles routes on first hit in CI.
        run: npx playwright test reflects --workers=1 --timeout=90000 --reporter=list,html

      - name: API log on failure
        if: failure()
        run: tail -n 200 /tmp/api.log || true

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 7
