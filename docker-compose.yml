services:
  db:
    image: postgres:17-alpine
    container_name: jovie-joy-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: jovie_joy
    volumes:
      - jovie-joy-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d jovie_joy"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  jovie-joy-db-data:
