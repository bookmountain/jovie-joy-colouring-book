services:
  db:
    image: postgres:17-alpine
    container_name: jovie-joy-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER required in apps/api/.env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required in apps/api/.env}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB required in apps/api/.env}
    volumes:
      - jovie-joy-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: jovie-joy-api:latest
    container_name: jovie-joy-api
    restart: unless-stopped
    env_file:
      - ./apps/api/.env
    ports:
      - "5080:8080"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://192.168.4.106:5080}
    image: jovie-joy-web:latest
    container_name: jovie-joy-web
    restart: unless-stopped
    ports:
      - "3080:3000"
    depends_on:
      - api

volumes:
  jovie-joy-db-data:
