services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: jovie-joy-api:latest
    container_name: jovie-joy-api
    restart: unless-stopped
    env_file:
      - ./apps/api/.env
    environment:
      ConnectionStrings__Default: Host=${POSTGRES_HOST:-shared-postgres};Port=${POSTGRES_PORT:-5432};Database=${POSTGRES_DB:?POSTGRES_DB required in apps/api/.env};Username=${POSTGRES_USER:?POSTGRES_USER required in apps/api/.env};Password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required in apps/api/.env}
    ports:
      - "5080:8080"
    networks:
      - default
      - shared-db

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://jovie-joy-api.bookmountain.work
    image: jovie-joy-web:latest
    container_name: jovie-joy-web
    restart: unless-stopped
    ports:
      - "3080:3000"
    depends_on:
      - api

networks:
  shared-db:
    external: true
    name: shared-services
